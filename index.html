<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>תאילנד — ארץ החיוכים</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Segoe UI', Arial, sans-serif;
      background: #ffffff;
      color: #1a1a2e;
      direction: rtl;
      min-height: 100vh;
    }

    /* ===== HERO ===== */
    .hero {
      position: relative;
      height: 30vh;
      min-height: 240px;
      overflow: hidden;
      flex-shrink: 0;
    }
    .hero img {
      width: 100%; height: 100%;
      object-fit: cover; object-position: center 60%;
      display: block;
    }
    .hero-overlay {
      position: absolute; inset: 0;
      background: linear-gradient(to bottom, rgba(0,0,0,0.1) 0%, rgba(0,0,0,0.6) 100%);
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      text-align: center; padding: 0 20px;
    }
    .hero-overlay h1 {
      font-size: clamp(1.8rem, 5vw, 3.8rem);
      font-weight: 800; letter-spacing: 2px;
      text-shadow: 0 2px 20px rgba(0,0,0,0.7); color: #fff;
    }
    .hero-overlay p {
      margin-top: 8px;
      font-size: clamp(0.9rem, 2vw, 1.3rem);
      color: rgba(255,255,255,0.85);
      text-shadow: 0 1px 8px rgba(0,0,0,0.6);
    }

    /* ===== NAV BAR ===== */
    #nav-bar {
      display: none; align-items: center; gap: 8px;
      flex-wrap: wrap; padding: 20px 32px 0;
    }
    .back-btn {
      display: flex; align-items: center; gap: 6px;
      background: rgba(220,160,0,0.1);
      border: 1px solid rgba(220,160,0,0.4);
      color: #b8860b; font-size: 0.9rem; font-weight: 600;
      padding: 6px 16px; border-radius: 30px;
      cursor: pointer; transition: background 0.2s; white-space: nowrap;
    }
    .back-btn:hover { background: rgba(220,160,0,0.2); }
    .nav-sep { color: rgba(0,0,0,0.25); font-size: 1.1rem; }
    .nav-current { color: #b8860b; font-weight: 600; font-size: 0.9rem; }

    /* ===== SECTION ===== */
    .section {
      padding: 32px 32px 64px;
      max-width: 1400px; margin: 0 auto;
    }
    .section-title {
      text-align: center; font-size: 1.6rem;
      margin-bottom: 32px; color: #b8860b; letter-spacing: 1px;
    }

    /* ===== GRIDS ===== */
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
      gap: 22px;
    }
    .grid.dest-grid .card { aspect-ratio: 4/3; }
    .grid.cat-grid  .card { aspect-ratio: 3/2.2; }
    .grid.hotel-grid { grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; }

    /* ===== STANDARD CARD ===== */
    .card {
      border-radius: 16px; overflow: hidden;
      cursor: pointer; position: relative;
      background: #f0f0f0;
      box-shadow: 0 4px 24px rgba(0,0,0,0.12);
      transition: transform 0.3s ease, box-shadow 0.3s ease;
    }
    .card:hover {
      transform: translateY(-6px) scale(1.02);
      box-shadow: 0 12px 40px rgba(249,199,79,0.22);
    }
    .card img { width: 100%; height: 100%; object-fit: cover; display: block; transition: transform 0.5s ease; }
    .card:hover img { transform: scale(1.08); }
    .card-label {
      position: absolute; bottom: 0; right: 0; left: 0;
      padding: 40px 16px 14px;
      background: linear-gradient(to top, rgba(0,0,0,0.88) 0%, transparent 100%);
      display: flex; flex-direction: column; align-items: flex-end;
    }
    .card-label .icon { font-size: 1.6rem; margin-bottom: 4px; }
    .card-label h3 { font-size: 1.2rem; font-weight: 700; color: #fff; text-shadow: 0 1px 6px rgba(0,0,0,0.7); }
    .card-label span { font-size: 0.76rem; color: #f9c74f; margin-top: 3px; }

    /* ===== HOTEL CARD ===== */
    .hotel-card {
      border-radius: 16px; overflow: hidden;
      background: #ffffff;
      box-shadow: 0 4px 20px rgba(0,0,0,0.1);
      cursor: pointer;
      transition: transform 0.3s ease, box-shadow 0.3s ease;
      display: flex; flex-direction: column;
    }
    .hotel-card:hover {
      transform: translateY(-5px);
      box-shadow: 0 12px 36px rgba(249,199,79,0.2);
    }
    .hotel-card .hotel-img-wrap {
      width: 100%; height: 190px; overflow: hidden; flex-shrink: 0;
    }
    .hotel-card .hotel-img-wrap img {
      width: 100%; height: 100%; object-fit: cover; display: block;
      transition: transform 0.5s ease;
    }
    .hotel-card:hover .hotel-img-wrap img { transform: scale(1.07); }
    .hotel-card .hotel-info {
      padding: 14px 16px 16px;
      display: flex; flex-direction: column; gap: 6px;
      flex: 1;
    }
    .hotel-card .hotel-name {
      font-size: 1rem; font-weight: 700; color: #1a1a2e; line-height: 1.3;
    }
    .hotel-card .hotel-stars { color: #d4a017; font-size: 0.85rem; letter-spacing: 1px; }
    .hotel-card .hotel-desc {
      font-size: 0.78rem; color: rgba(0,0,0,0.55); line-height: 1.5;
    }
    .hotel-card .hotel-price {
      font-size: 0.8rem; font-weight: 600;
      color: #4ade80; margin-top: auto; padding-top: 8px;
    }

    /* ===== INSURANCE CARD ===== */
    .insurance-card {
      border: 2px solid rgba(249,199,79,0.5) !important;
      box-shadow: 0 4px 24px rgba(249,199,79,0.15) !important;
    }
    .insurance-card .card-label {
      background: linear-gradient(to top, rgba(10,20,10,0.92) 0%, transparent 100%);
    }
    .insurance-card .card-label h3 { color: #f9c74f; }

    /* ===== CHABAD CARD ===== */
    .chabad-card {
      background: linear-gradient(135deg, #f9f9f9 0%, #eef7ee 100%);
      border: 1px solid rgba(0,160,80,0.25);
      border-radius: 20px;
      padding: 32px;
      max-width: 680px;
      margin: 0 auto;
      box-shadow: 0 8px 40px rgba(0,160,80,0.08);
    }
    .chabad-card .chabad-header {
      display: flex; align-items: center; gap: 16px; margin-bottom: 24px;
    }
    .chabad-card .chabad-icon { font-size: 3rem; }
    .chabad-card .chabad-title { font-size: 1.4rem; font-weight: 800; color: #1a1a2e; }
    .chabad-card .chabad-subtitle { font-size: 0.85rem; color: rgba(0,0,0,0.45); margin-top: 4px; }
    .chabad-card .chabad-row {
      display: flex; align-items: flex-start; gap: 12px;
      padding: 14px 0; border-bottom: 1px solid rgba(0,0,0,0.07);
      font-size: 0.95rem;
    }
    .chabad-card .chabad-row:last-child { border-bottom: none; }
    .chabad-card .chabad-row .label {
      color: rgba(0,0,0,0.4); min-width: 90px; font-size: 0.82rem; padding-top: 2px;
    }
    .chabad-card .chabad-row .value { color: #1a1a2e; line-height: 1.6; }
    .chabad-card .chabad-row a { color: #16a34a; text-decoration: none; }
    .chabad-card .chabad-row a:hover { text-decoration: underline; }
    .chabad-no {
      text-align: center; color: rgba(0,0,0,0.45);
      font-size: 1rem; padding: 40px 20px; line-height: 1.8;
    }
    .chabad-no strong { color: #b8860b; }

    /* ===== FADE ===== */
    .fade-in { animation: fadeIn 0.35s ease; }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    footer {
      text-align: center; padding: 20px;
      color: rgba(0,0,0,0.35); font-size: 0.78rem;
      border-top: 1px solid rgba(0,0,0,0.08);
    }

let currentDest = null;

// ─── DOM ───────────────────────────────────────────────────────────────────
const grid      = document.getElementById('main-grid');
const navBar    = document.getElementById('nav-bar');

const heroTitle = document.getElementById('hero-title');
const heroSub   = document.getElementById('hero-sub');
const secTitle  = document.getElementById('section-title');

// ─── NAV ───────────────────────────────────────────────────────────────────
function renderNav(crumbs) {
  // crumbs: [{label, onClick}]
  if (!crumbs.length) { navBar.style.display = 'none'; return; }
  navBar.style.display = 'flex';
  navBar.innerHTML = crumbs.map((c, i) => {
    const isLast = i === crumbs.length - 1;
    if (isLast) return `<span class="nav-current">${c.label}</span>`;
    return `<button class="back-btn" data-i="${i}">${c.label}</button><span class="nav-sep">›</span>`;
  }).join('');
  navBar.querySelectorAll('.back-btn').forEach(btn => {
    const i = +btn.dataset.i;
    btn.addEventListener('click', crumbs[i].onClick);
  });
}

// ─── CARD BUILDERS ─────────────────────────────────────────────────────────
function makeCard(imgSrc, iconHtml, title, subtitle, onClick) {
  const card = document.createElement('div');
  card.className = 'card';
  card.innerHTML = `
    <img src="${imgSrc}" alt="${title}" loading="lazy" />
    <div class="card-label">
      ${iconHtml ? `<div class="icon">${iconHtml}</div>` : ''}
      <h3>${title}</h3>
      ${subtitle ? `<span>${subtitle}</span>` : ''}
    </div>`;
  card.addEventListener('click', onClick);
  return card;
}

function makeHotelCard(hotel, imgSrc) {
  const card = document.createElement('div');
  card.className = 'hotel-card';
  const stars = '★'.repeat(hotel.stars) + '☆'.repeat(5 - hotel.stars);
  card.innerHTML = `
    <div class="hotel-img-wrap">
      <img src="${imgSrc}" alt="${hotel.name}" loading="lazy" />
    </div>
    <div class="hotel-info">
      <div class="hotel-name">${hotel.name}</div>
      <div class="hotel-stars">${stars}</div>
      <div class="hotel-desc">${hotel.desc}</div>
      <div class="hotel-price">${hotel.price}</div>
    </div>`;
  return card;
}
